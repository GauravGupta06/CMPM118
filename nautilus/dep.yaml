# ==========================
# GPU Deployment
# ==========================
# This defines a GPU-enabled deployment that automatically creates
# pods with your specified container image. Each replica runs one pod.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: laurena-dep
  labels:
    app: any-gpu
spec:
  replicas: 1                         
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: any-gpu
  template:
    metadata:
      labels:
        app: any-gpu
    spec:
      restartPolicy: Always
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-L4
                      - NVIDIA-A10
                      - NVIDIA-GeForce-RTX-3090
                      - NVIDIA-GeForce-GTX-1080-Ti
              - matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values:
                      - us-west
      containers:
        - name: gpu-container
          image: pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime  
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update && apt-get install -y byobu htop git
              echo "Container ready. Sleeping indefinitely..."
              sleep infinity
          resources:
            requests:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: examplevol
              mountPath: /examplevol
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "16Gi"
        - name: examplevol
          persistentVolumeClaim:
            claimName: cmpm118-rwx
